name: Daily Watchlist Update

on:
  schedule:
    # All times are UTC. KST = UTC+9
    - cron: "10 15 * * *"  # 00:10 KST
    - cron: "10 0 * * *"   # 09:10 KST
    - cron: "10 3 * * *"   # 12:10 KST
    - cron: "10 7 * * *"   # 16:10 KST
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  update-watchlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchlist updater
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/update_watchlist.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlist.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')
            git commit -m "data: update watchlist ${TIMESTAMP} KST"
            git push
          fi
