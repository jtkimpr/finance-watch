name: Daily Watchlist Update

on:
  schedule:
    # 맥미니 cron이 정시 트리거 담당 (workflow_dispatch)
    # 아래는 맥미니 장애 시 백업용 (30분 지연 허용)
    - cron: "40 0 * * *"   # 09:40 KST (backup)
  workflow_dispatch:        # 맥미니 cron 및 수동 트리거

permissions:
  contents: write

jobs:
  update-watchlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchlist updater
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/update_watchlist.py

      - name: Generate portfolio JSON
        run: python scripts/generate_portfolio_json.py

      - name: Update strategy prices
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/update_prices.py

      - name: Update holdings data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/update_holdings.py || true

      - name: Generate performance data
        run: python scripts/generate_performance.py

      - name: Generate price history data
        run: python scripts/generate_price_history.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlist.xlsx data/portfolio.json data/strategy/ data/performance.json data/price-history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')
            git commit -m "data: update ${TIMESTAMP} KST"
            git push
          fi
